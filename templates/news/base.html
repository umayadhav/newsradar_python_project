<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsRadar 📰</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f13;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background: rgba(15,15,19,0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-link {
            color: #aaa !important;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 6px 14px !important;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-link:hover {
            color: #fff !important;
            background: rgba(255,255,255,0.08);
        }
        .nav-link.active {
            color: #e94560 !important;
            background: rgba(233,69,96,0.12);
        }

        /* ── Hero ── */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 70px 0 60px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(233,69,96,0.15), transparent 70%);
            top: -100px; right: -100px;
            border-radius: 50%;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .search-wrapper {
            max-width: 550px;
            margin: 28px auto 0;
            position: relative;
        }
        .search-wrapper input {
            width: 100%;
            padding: 16px 60px 16px 22px;
            border-radius: 50px;
            border: 1.5px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .search-wrapper input::placeholder { color: #888; }
        .search-wrapper input:focus {
            border-color: #e94560;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 4px rgba(233,69,96,0.15);
        }
        .search-wrapper button {
            position: absolute;
            right: 6px; top: 6px;
            background: linear-gradient(135deg, #e94560, #c73652);
            border: none;
            border-radius: 50px;
            padding: 10px 22px;
            color: #fff;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-wrapper button:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }

        /* ── Section Title ── */
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin: 35px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin-left: 10px;
        }

        /* ── News Card ── */
        .news-card {
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 22px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .news-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e94560, #f5a623);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .news-card:hover {
            border-color: rgba(233,69,96,0.3);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .news-card:hover::before { opacity: 1; }

        .card-source {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(233,69,96,0.15);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .card-date {
            color: #666;
            font-size: 0.75rem;
            margin-left: auto;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e8e8e8;
            line-height: 1.5;
            margin-bottom: 10px;
            flex-grow: 1;
        }
        .card-desc {
            color: #777;
            font-size: 0.82rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .card-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .btn-read {
            color: #e94560;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: gap 0.2s;
        }
        .btn-read:hover { gap: 8px; color: #f5a623; }
        .btn-save {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-save:hover {
            background: rgba(233,69,96,0.15);
            border-color: #e94560;
            color: #e94560;
        }

        /* ── Category Pills ── */
        .category-pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .pill {
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            transition: all 0.2s;
        }
        .pill:hover, .pill.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-item { color: #aaa; font-size: 0.85rem; }
        .stat-item span { color: #e94560; font-weight: 700; }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; color: #333; }
        .empty-state h4 { color: #888; margin-bottom: 8px; }

        /* ── Footer ── */
        footer {
            background: #0a0a0f;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
            color: #444;
            font-size: 0.85rem;
        }
        footer span { color: #e94560; }

        /* ── Digest Card ── */
        .digest-card {
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 22px;
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        .digest-card:hover {
            border-color: rgba(233,69,96,0.3);
            transform: translateX(4px);
        }
        .digest-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: rgba(233,69,96,0.3);
            line-height: 1;
            min-width: 50px;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f13; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #e94560; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">⚡ NewsRadar</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <i class="fas fa-bars" style="color:#aaa;"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-globe me-1"></i>Headlines</a></li>
                <li class="nav-item"><a class="nav-link" href="/category/technology/"><i class="fas fa-microchip me-1"></i>Tech</a></li>
                <li class="nav-item"><a class="nav-link" href="/category/sports/"><i class="fas fa-trophy me-1"></i>Sports</a></li>
                <li class="nav-item"><a class="nav-link" href="/category/business/"><i class="fas fa-chart-line me-1"></i>Business</a></li>
                <li class="nav-item"><a class="nav-link" href="/search/"><i class="fas fa-search me-1"></i>Search</a></li>
                <li class="nav-item"><a class="nav-link" href="/favourites/"><i class="fas fa-star me-1"></i>Favourites</a></li>
                <li class="nav-item"><a class="nav-link" href="/digest/"><i class="fas fa-newspaper me-1"></i>Digest</a></li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<!-- Footer -->
<footer>
    <p>Built with <span>♥</span> using Python OOP + Django | <span>NewsRadar</span> © 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
